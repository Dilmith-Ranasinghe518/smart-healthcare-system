version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: smart-healthcare-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - healthcare-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-healthcare-backend
    ports:
      - "5001:5000"
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
    networks:
      - healthcare-network
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-healthcare-frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5001/api
    depends_on:
      - backend
    networks:
      - healthcare-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  mongodb_data:

networks:
  healthcare-network:
    driver: bridge
