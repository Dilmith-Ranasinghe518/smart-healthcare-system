
services:
  mongodb:
    image: mongo:latest
    container_name: smart-healthcare-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - healthcare-network

  api-gateway:
    build:
      context: ./backend/services/api-gateway
      dockerfile: Dockerfile
    container_name: smart-healthcare-api-gateway
    ports:
      - "5005:${GATEWAY_PORT}"
    env_file:
      - .env
    depends_on:
      - auth-service
      - user-service
      - telemedicine-service
      - prescription-service
      - ai-symptom-service
    networks:
      - healthcare-network

  auth-service:
    build:
      context: ./backend/services/auth-service
      dockerfile: Dockerfile
    container_name: smart-healthcare-auth-service
    ports:
      - "${AUTH_PORT}:${AUTH_PORT}"
    env_file:
      - .env
    depends_on:
      - mongodb
    networks:
      - healthcare-network

  user-service:
    build:
      context: ./backend/services/user-service
      dockerfile: Dockerfile
    container_name: smart-healthcare-user-service
    ports:
      - "${USER_PORT}:${USER_PORT}"
    env_file:
      - .env
    depends_on:
      - mongodb
    networks:
      - healthcare-network

  telemedicine-service:
    build:
      context: ./backend/services/telemedicine-service
      dockerfile: Dockerfile
    container_name: smart-healthcare-telemedicine-service
    ports:
      - "${TELEMEDICINE_PORT}:${TELEMEDICINE_PORT}"
    env_file:
      - .env
    networks:
      - healthcare-network

  prescription-service:
    build:
      context: ./backend/services/prescription-service
      dockerfile: Dockerfile
    container_name: smart-healthcare-prescription-service
    ports:
      - "${PRESCRIPTION_PORT}:${PRESCRIPTION_PORT}"
    env_file:
      - .env
    networks:
      - healthcare-network

  ai-symptom-service:
    build:
      context: ./backend/services/ai-symptom-service
      dockerfile: Dockerfile
    container_name: smart-healthcare-ai-symptom-service
    ports:
      - "5006:5006"
    env_file:
      - .env
    networks:
      - healthcare-network
  
  doctor-service:
    build:
      context: ./backend/services/doctor-service
      dockerfile: Dockerfile
    container_name: smart-healthcare-doctor-service
    ports:
      - "${DOCTOR_PORT}:${DOCTOR_PORT}"
    env_file:
      - .env
    networks:
      - healthcare-network
    volumes:
      - ./backend/services/user-service:/app/user-service

  appointment-service:
    build:
      context: ./backend/services/appointment-service
      dockerfile: Dockerfile
    container_name: smart-healthcare-appointment-service
    ports:
      - "${APPOINTMENT_PORT}:${APPOINTMENT_PORT}"
    env_file:
      - .env
    depends_on:
      - mongodb
    networks:
      - healthcare-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-healthcare-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5005/api
    depends_on:
      - api-gateway
    networks:
      - healthcare-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  mongodb_data:


networks:
  healthcare-network:
    driver: bridge