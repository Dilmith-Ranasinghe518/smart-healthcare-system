apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-symptom-service
  template:
    metadata:
      labels:
        app: ai-symptom-service
    spec:
      containers:
      - name: ai-symptom-service
        image: smart-healthcare/ai-symptom-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5006
        envFrom:
        - configMapRef:
            name: smart-healthcare-config
        - secretRef:
            name: smart-healthcare-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ai-symptom-service
spec:
  ports:
  - port: 5006
    targetPort: 5006
  selector:
    app: ai-symptom-service