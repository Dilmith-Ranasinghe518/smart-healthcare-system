apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-symptom-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-symptom-service
  template:
    metadata:
      labels:
        app: ai-symptom-service
    spec:
      containers:
        - name: ai-symptom-service
          image: ai-symptom-service:latest
          ports:
            - containerPort: 5006
          env:
            - name: PORT
              value: "5006"
            - name: GEMINI_MODEL
              value: "gemini-1.5-flash"
            - name: GEMINI_API_KEY
              value: "PUT_SECRET_HERE"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-symptom-service
spec:
  selector:
    app: ai-symptom-service
  ports:
    - protocol: TCP
      port: 5006
      targetPort: 5006